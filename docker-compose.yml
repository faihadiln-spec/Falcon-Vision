services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    environment:
      UPLOAD_DIR: /app/backend/uploads
    ports:
      - "8000:8000"
    volumes:
      - falcon_uploads:/app/backend/uploads
      - insightface_cache:/root/.insightface
    restart: unless-stopped

volumes:
  falcon_uploads:
  insightface_cache:
